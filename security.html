<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Check</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #E9D7FF; /* Soft Lavender */
        display: flex;
        justify-content: center;
        align-items: center; 
        height: 100vh;
        margin: 0;
    }
    .security-box {
        background: #FFFFFF;
        padding: 30px 40px;
        border-radius: 20px;
        width: 350px;
        text-align: center;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    }
    h2 {
        color: #754C9E;
        margin-bottom: 25px;
    }
    select, input {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: 1px solid #CEB7E8;
        border-radius: 10px;
        outline: none;
    }
    input:focus {
        border-color: #754C9E;
    }
    button {
        width: 100%;
        padding: 12px;
        background-color: #754C9E;
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        margin-top: 12px;
        transition: 0.3s;
    }
    button:hover {
        background-color: #603C8A;
    }
</style>
</head>
<body>
    <div class="security-box">
        <h2>Security Check</h2>
        <select>
            <option>Select a Security Question</option>
            <option>Your favorite color?</option>
            <option>Your first school?</option>
            <option>Your pet's name?</option>
        </select>
        <input type="text" placeholder="Enter Answer">
        <button onclick="alert('Access Granted')">Submit</button>
    </div>
</body>
</html>
